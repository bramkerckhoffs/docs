<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#3ecf8e"/>
  <!-- Verticale streep links -->
  <line x1="8" y1="7" x2="8" y2="25" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Boven: lang (dak van B) -->
  <line x1="8" y1="7" x2="22" y2="7" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Midden: kort (taille van B) -->
  <line x1="8" y1="16" x2="17" y2="16" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Onder: lang (bodem van B) -->
  <line x1="8" y1="25" x2="22" y2="25" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
</svg>
