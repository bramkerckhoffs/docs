<div class="breadcrumb">
  {{ if .IsHome }}
  <span class="current">{{ .Site.Title }}</span>
  {{ else }}
  <a href="{{ .Site.Home.RelPermalink }}">{{ .Site.Title }}</a>
  {{ range .Ancestors.Reverse }}
    {{ if not .IsHome }}
    <span class="sep">›</span>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ end }}
  {{ end }}
  <span class="sep">›</span>
  <span class="current">{{ .Title }}</span>
  {{ end }}
</div>
