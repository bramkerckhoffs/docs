<nav class="icon-rail">

  {{/* Logo */}}
  <a href="/" class="rail-logo" title="{{ .Site.Title }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16M4 12h10M4 18h6"/>
    </svg>
  </a>

  {{/* Home */}}
  <a href="/" class="rail-item {{ if .IsHome }}active{{ end }}" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12L12 4l9 8"/>
      <path d="M9 21V12h6v9"/>
      <rect x="3" y="12" width="18" height="9" rx="1" fill="none"/>
      <path d="M3 12v9h18V12"/>
    </svg>
  </a>

  <div class="rail-spacer"></div>

  {{/* Sections with their icons */}}
  {{ range .Site.Sections }}
    {{ $active := or (eq $.Page.Section .Section) ($.Page.IsDescendant .) }}
    <a href="{{ .RelPermalink }}"
       class="rail-item {{ if $active }}active{{ end }}"
       title="{{ .Title }}">
      {{ partial "section-icon.html" . }}
    </a>
  {{ end }}

  <div class="rail-spacer"></div>

</nav>
