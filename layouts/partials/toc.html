{{/* Rendert alleen de TOC-inhoud — de <aside> wrapper zit in single.html */}}
{{ $toc := .TableOfContents }}
{{ if $toc }}
<div class="toc-label">Op deze pagina</div>
{{ $toc }}

<script>
(function () {
  var headings = document.querySelectorAll('.article-body h2, .article-body h3');
  var links    = document.querySelectorAll('.article-toc a');
  if (!headings.length || !links.length) return;

  var linkMap = {};
  links.forEach(function (a) {
    var id = decodeURIComponent(a.getAttribute('href')).replace('#', '');
    linkMap[id] = a;
  });

  var current = '';

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        var id = entry.target.getAttribute('id');
        if (id && id !== current) {
          if (linkMap[current]) linkMap[current].classList.remove('active');
          current = id;
          if (linkMap[current]) linkMap[current].classList.add('active');
        }
      }
    });
  }, { rootMargin: '-64px 0px -60% 0px', threshold: 0 });

  headings.forEach(function (h) { if (h.id) observer.observe(h); });
})();
</script>
{{ end }}
