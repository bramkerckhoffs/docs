<div class="mobile-nav" id="mobileNav">

  <div class="mobile-nav-header">
    <a href="/" class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h10M4 18h6"/>
        </svg>
      </div>
      <span class="brand-name">Bram Kerckhoffs</span>
    </a>
    <button class="mobile-nav-close" id="mobileNavClose" aria-label="Sluiten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <nav class="mobile-nav-body">

    <a href="/" class="mobile-item{{ if .IsHome }} active{{ end }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/>
      </svg>
      Overzicht
    </a>

    {{ range .Site.Sections }}
    {{ $active := or (eq $.Page.Section .Section) ($.Page.IsDescendant .) }}
    <details class="mobile-section"{{ if $active }} open{{ end }}>
      <summary class="mobile-section-header">
        <span class="mobile-section-icon">{{ partial "section-icon.html" . }}</span>
        <a href="{{ .RelPermalink }}" class="mobile-section-title">{{ .Title }}</a>
        <span class="mobile-section-count">{{ len .Pages }}</span>
      </summary>
      {{ range .Pages.ByWeight }}
      <a href="{{ .RelPermalink }}" class="mobile-subitem{{ if eq $.Page.RelPermalink .RelPermalink }} active{{ end }}">
        {{ .Title }}
      </a>
      {{ end }}
    </details>
    {{ end }}

  </nav>

  <div class="mobile-nav-footer">
    <button class="mobile-search-btn" onclick="openSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Zoeken…
      <kbd>Ctrl K</kbd>
    </button>
  </div>

</div>

<div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
